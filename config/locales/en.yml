# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  context_help:
    users:
      email: "Google OAuth email for the teammate you are inviting. They appear as unauthorized until an admin approves access."
      role_invite: "Reference only—new accounts are created as unauthorized and admins approve access from the request email."
      role_change: "Admin can manage users and CSV imports. Editor can edit site content. Unauthorized blocks sign-in until changed."
    import:
      ideathons: "UTF-8 CSV with header row: year, theme. Each row is one ideathon."
      sponsors_partners: "UTF-8 CSV with header row: year, name, job_title, logo_url, blurb, is_sponsor (true/false). Each row is one sponsor or partner."
      mentors_judges: "UTF-8 CSV with header row: year, name, job_title, photo_url, bio, is_judge (true/false). Each row is one mentor or judge."
      faqs: "UTF-8 CSV with header row: year, question, answer. Each row is one FAQ."
      rules: "UTF-8 CSV with header row: year, rule_text. Each row is one rule."
